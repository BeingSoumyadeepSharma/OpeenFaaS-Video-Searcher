apiVersion: v1
kind: ServiceAccount
metadata:
  name: sqs-bridge
  namespace: openfaas-fn
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqs-bridge-ffmpeg0-to-librosa
  namespace: openfaas-fn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sqs-bridge-ffmpeg0-to-librosa
  template:
    metadata:
      labels:
        app: sqs-bridge-ffmpeg0-to-librosa
    spec:
      serviceAccountName: sqs-bridge
      containers:
        - name: bridge
          image: soumyadeeps/videosearcher-sqs-bridge:latest
          imagePullPolicy: Always
          env:
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            - name: GATEWAY_URL
              value: http://gateway.openfaas:8080
            - name: QUEUE_URL
              value: https://sqs.us-east-1.amazonaws.com/249934838928/videosearcher-ffmpeg0-to-librosa
            - name: TARGET_FUNCTION
              value: librosa-fn
            - name: WAIT_TIME_SECONDS
              value: "20"
            - name: VISIBILITY_TIMEOUT_SECONDS
              value: "600"
            - name: REQUEST_TIMEOUT_SECONDS
              value: "900"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
