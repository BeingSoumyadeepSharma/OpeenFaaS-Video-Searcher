# VideoSearcher OpenFaaS Stack
#
# Build images manually with:
#   docker build -f ffmpeg-0/Dockerfile -t videosearcher/ffmpeg-0:latest .
#   (repeat for each function — see build.sh)
#
# Deploy:  faas-cli deploy -f stack.yml
# Invoke:  curl -X POST http://127.0.0.1:8080/function/ffmpeg-0 \
#            -d '{"input":"/mnt/data/video.mp4","output":"/mnt/data/out/ffmpeg0"}'
#
# S3 Support:
#   All functions now support S3 paths (s3://bucket/key) for input and output.
#   Set AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY below (or use IRSA on EKS).
# Queue Chaining (OpenFaaS, no Lambda):
#   JMeter should call only ffmpeg-0.
#   Each function publishes the next-stage SQS message using NEXT_QUEUES_JSON.
#   Replace queue_url placeholders below with your real SQS queue URLs.
#   Invoke with S3:
#     curl -X POST http://<gateway>/function/ffmpeg-0 \
#       -d '{"input":"s3://my-bucket/videos/input.mp4","output":"s3://my-bucket/results/ffmpeg0"}'

provider:
  name: openfaas
  gateway: http://a86db78a1498941edbb5952f01041129-854708034.us-east-1.elb.amazonaws.com:8080

functions:

  # ── Stage 0: Split audio + video from input ──────────────────────────
  ffmpeg-0:
    skip_build: true
    image: soumyadeeps/ffmpeg-0:latest
    environment:
      write_timeout: "600s"
      read_timeout: "600s"
      exec_timeout: "600s"
      # AWS credentials for S3 support (leave empty if using IRSA on EKS)
      AWS_DEFAULT_REGION: "us-east-1"
      CURRENT_STAGE: "ffmpeg-0"
      NEXT_QUEUES_JSON: "[{\"queue_url\":\"https://sqs.us-east-1.amazonaws.com/249934838928/videosearcher-ffmpeg0-to-librosa\",\"stage\":\"librosa\"}]"
      # AWS_ACCESS_KEY_ID: ""
      # AWS_SECRET_ACCESS_KEY: ""
    labels:
      com.openfaas.scale.min: "1"
      com.openfaas.scale.max: "5"
    annotations:
      com.openfaas.health.http.initialDelay: "10s"
    limits:
      memory: 512Mi
    requests:
      memory: 256Mi

  # ── Stage 1: Cut video into clips using timestamps ───────────────────
  ffmpeg-1:
    skip_build: true
    image: soumyadeeps/ffmpeg-1:latest
    environment:
      write_timeout: "600s"
      read_timeout: "600s"
      exec_timeout: "600s"
      AWS_DEFAULT_REGION: "us-east-1"
      CURRENT_STAGE: "ffmpeg-1"
      NEXT_QUEUES_JSON: "[{\"queue_url\":\"https://sqs.us-east-1.amazonaws.com/249934838928/videosearcher-ffmpeg1-to-ffmpeg2\",\"stage\":\"ffmpeg-2\"}]"
    labels:
      com.openfaas.scale.min: "1"
      com.openfaas.scale.max: "5"
    limits:
      memory: 512Mi
    requests:
      memory: 128Mi

  # ── Stage 2: Downsample audio + compress video per clip ──────────────
  ffmpeg-2:
    skip_build: true
    image: soumyadeeps/ffmpeg-2:latest
    environment:
      write_timeout: "600s"
      read_timeout: "600s"
      exec_timeout: "600s"
      AWS_DEFAULT_REGION: "us-east-1"
      CURRENT_STAGE: "ffmpeg-2"
      NEXT_QUEUES_JSON: "[{\"queue_url\":\"https://sqs.us-east-1.amazonaws.com/249934838928/videosearcher-ffmpeg2-to-ffmpeg3\",\"stage\":\"ffmpeg-3\"},{\"queue_url\":\"https://sqs.us-east-1.amazonaws.com/249934838928/videosearcher-ffmpeg2-to-deepspeech\",\"stage\":\"deepspeech\"}]"
    labels:
      com.openfaas.scale.min: "1"
      com.openfaas.scale.max: "5"
    limits:
      memory: 512Mi
    requests:
      memory: 128Mi

  # ── Stage 3: Extract frames from clip ────────────────────────────────
  ffmpeg-3:
    skip_build: true
    image: soumyadeeps/ffmpeg-3:latest
    environment:
      write_timeout: "600s"
      read_timeout: "600s"
      exec_timeout: "600s"
      AWS_DEFAULT_REGION: "us-east-1"
      CURRENT_STAGE: "ffmpeg-3"
      NEXT_QUEUES_JSON: "[{\"queue_url\":\"https://sqs.us-east-1.amazonaws.com/249934838928/videosearcher-ffmpeg3-to-object\",\"stage\":\"object-detector\"}]"
    labels:
      com.openfaas.scale.min: "1"
      com.openfaas.scale.max: "5"
    limits:
      memory: 512Mi
    requests:
      memory: 128Mi

  # ── Librosa: Detect speech timestamps ────────────────────────────────
  librosa-fn:
    skip_build: true
    image: soumyadeeps/librosa-fn:latest
    environment:
      write_timeout: "600s"
      read_timeout: "600s"
      exec_timeout: "600s"
      AWS_DEFAULT_REGION: "us-east-1"
      CURRENT_STAGE: "librosa"
      NEXT_QUEUES_JSON: "[{\"queue_url\":\"https://sqs.us-east-1.amazonaws.com/249934838928/videosearcher-librosa-to-ffmpeg1\",\"stage\":\"ffmpeg-1\"}]"
    labels:
      com.openfaas.scale.min: "1"
      com.openfaas.scale.max: "3"
    limits:
      memory: 1Gi
    requests:
      memory: 128Mi

  # ── DeepSpeech: Speech-to-text transcription ─────────────────────────
  deepspeech-fn:
    skip_build: true
    image: soumyadeeps/deepspeech-fn:latest
    environment:
      write_timeout: "600s"
      read_timeout: "600s"
      exec_timeout: "600s"
      AWS_DEFAULT_REGION: "us-east-1"
      CURRENT_STAGE: "deepspeech"
      NEXT_QUEUES_JSON: "[]"
    labels:
      com.openfaas.scale.min: "1"
      com.openfaas.scale.max: "3"
    limits:
      memory: 1Gi
    requests:
      memory: 128Mi

  # ── Object Detector: YOLOv4 on extracted frames ─────────────────────
  object-detector:
    skip_build: true
    image: soumyadeeps/object-detector:latest
    environment:
      write_timeout: "600s"
      read_timeout: "600s"
      exec_timeout: "600s"
      AWS_DEFAULT_REGION: "us-east-1"
      CURRENT_STAGE: "object-detector"
      NEXT_QUEUES_JSON: "[]"
    labels:
      com.openfaas.scale.min: "1"
      com.openfaas.scale.max: "3"
    annotations:
      com.openfaas.health.http.initialDelay: "30s"
    limits:
      memory: 4Gi
    requests:
      memory: 512Mi
